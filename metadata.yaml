name: astrbot_plugin_steam_friend_monitor
display_name: Steam 好友在线监控
desc: |-
  ·轮询 Steam 玩家状态（在线/离线/忙碌/离开等）
  ·玩家上线、下线、启动游戏、关闭游戏、切换游戏时自动推送图片到已绑定会话
  ·支持手动查询当前状态图
  ·支持为每个群单独设置监控对象
  ·网络不通时自动使用缓存的头像和游戏图片
  ·显示当前游戏游玩时长
  ·图片缓存到本地，避免steam网络不通
  ·频繁上下线可以过滤
  ·增加游玩时长统计
  ·新增配置，可以不统计离开状态的时长
version: 0.7.4
author: FlandreSatori
repo: https://github.com/FlandreSatori/astrbot_plugin_steam_friend_monitor
